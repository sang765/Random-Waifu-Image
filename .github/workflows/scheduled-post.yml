name: Scheduled Waifu Post

on:
  workflow_dispatch:
    # https://console.cron-job.org/ for schedule

jobs:
  post-waifu:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Post waifu images
        env:
          SFW_WEBHOOK_URL: ${{ secrets.SFW_WEBHOOK_URL }}
          NSFW_WEBHOOK_URL: ${{ secrets.NSFW_WEBHOOK_URL }}
          POST_SFW: ${{ vars.POST_SFW }}
          POST_NSFW: ${{ vars.POST_NSFW }}
        run: |
          if [ "${{ vars.POST_SFW }}" = "true" ]; then
            npm start -- --random-tags
          fi
          if [ "${{ vars.POST_NSFW }}" = "true" ]; then
            npm start -- --random-tags --nsfw
          fi
        shell: bash
